<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>伺服电机控制面板</title>
</head>
<body>
    <h2>伺服电机控制面板</h2>

    <div>
        <h3>连接</h3>
        <input type="text" id="wsUrl" value="ws://localhost:2345" size="30">
        <button id="connectBtn">连接</button>
        <button id="disconnectBtn" disabled>断开</button>
        <span id="connStatus">未连接</span>
    </div>
    <hr>

    <div>
        <h3>从机ID</h3>
        <input type="text" id="slaveId" value="0x01" size="10">
    </div>
    <hr>

    <div>
        <h3>1. 校准 (Cal)</h3>
        <button id="calBtn">校准电机</button>
    </div>
    <hr>

    <div>
        <h3>2. 移动 (Mv)</h3>
        <p>3200 脉冲 = 1圈 = 4mm</p>
        <label>脉冲数量: <input type="number" id="mvPulse" value="3200"></label>
        <button id="mvBtn">移动</button>
    </div>
    <hr>

    <div>
        <h3>3. 移动参数设置 (MvSetting)</h3>
        <label>加速度 (0~255): <input type="number" id="mvAccel" value="100" min="0" max="255"></label><br>
        <label>速度 (0~5000 rpm): <input type="number" id="mvSpeed" value="1200" min="0" max="5000"></label><br>
        <button id="mvSettingBtn">设置</button>
    </div>
    <hr>

    <div>
        <h3>4. 停止 (Stop)</h3>
        <button id="stopBtn">停止</button>
    </div>
    <hr>

    <div>
        <h3>5. 归零 (Zero)</h3>
        <button id="zeroBtn">归零</button>
    </div>
    <hr>

    <div>
        <h3>6. 归零参数设置 (ZeroSetting)</h3>
        <label>归零速度 (0~5000 rpm): <input type="number" id="zsSpeed" value="300" min="0" max="5000"></label><br>
        <label>回零超时时间 (ms): <input type="number" id="zsTimeout" value="10000" min="0" max="999999"></label><br>
        <label>碰撞检测转速 (0~5000 rpm): <input type="number" id="zsCollSpeed" value="300" min="0" max="5000"></label><br>
        <label>碰撞检测电流 (0~6000 mA): <input type="number" id="zsCollCurrent" value="800" min="0" max="6000"></label><br>
        <label>碰撞检测时间 (0~65535 ms): <input type="number" id="zsCollTime" value="60" min="0" max="65535"></label><br>
        <button id="zeroSettingBtn">设置</button>
    </div>
    <hr>

    <div>
        <h3>7. 查询回零状态 (ZeroStatus)</h3>
        <button id="zeroStatusBtn">查询</button>
        <span id="zeroStatusResult" style="margin-left: 10px; font-weight: bold; color: #0066cc;"></span>
    </div>
    <hr>

    <div>
        <h3>8. 查询电机状态 (EStatus)</h3>
        <button id="eStatusBtn">查询</button>
        <span id="eStatusResult" style="margin-left: 10px; font-weight: bold; color: #0066cc;"></span>
    </div>
    <hr>

    <div>
        <h3>日志</h3>
        <textarea id="log" rows="20" cols="80" readonly></textarea>
    </div>

    <script>
        let ws = null;
        let pendingCmd = null;

        const $ = id => document.getElementById(id);
        const log = (msg) => {
            const ta = $('log');
            ta.value += '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
            ta.scrollTop = ta.scrollHeight;
        };

        function sendCmd(cmd, data) {
            const id = $('slaveId').value.trim();
            if (!id) { log('请填写从机ID'); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN) { log('未连接到服务器'); return; }
            const msg = JSON.stringify({ cmd, id, data });
            log('→ ' + msg);
            pendingCmd = cmd;
            ws.send(msg);
        }

        function getHexString(data) {
            if (Array.isArray(data) && data.length > 0) return data[0];
            if (typeof data === 'string') return data;
            return null;
        }

        function parseStatusByte(hexStr) {
            if (!hexStr) return null;
            let clean = hexStr.replace(/^0x/, '').replace(/\s/g, '');
            if (clean.length < 10) return null;
            return parseInt(clean.substring(8, 10), 16);
        }

        const zeroStatusMap = {
            0x00: '未完成',
            0x03: '已完成'
        };

        const eStatusMap = {
            0x00: '未使能',
            0x01: '已使能',
            0x02: '位置到达',
            0x03: '使能+位置到达',
            0x40: '掉电',
            0x41: '掉电+使能',
            0x42: '掉电+位置到达',
            0x43: '掉电+使能+位置到达'
        };

        // ---- 连接 ----
        $('connectBtn').onclick = () => {
            const url = $('wsUrl').value.trim();
            ws = new WebSocket(url);
            ws.onopen = () => {
                $('connStatus').textContent = '已连接';
                $('connectBtn').disabled = true;
                $('disconnectBtn').disabled = false;
                log('已连接到 ' + url);
            };
            ws.onclose = () => {
                $('connStatus').textContent = '已断开';
                $('connectBtn').disabled = false;
                $('disconnectBtn').disabled = true;
                log('连接已关闭');
                ws = null;
                pendingCmd = null;
            };
            ws.onerror = () => { log('连接错误'); };
            ws.onmessage = (e) => {
                log('← ' + e.data);
                try {
                    const resp = JSON.parse(e.data);
                    if (resp.status === 'busy') {
                        log('系统繁忙');
                        return;
                    }

                    const hexStr = getHexString(resp.data);
                    if (!hexStr) return;

                    const cmd = pendingCmd ? pendingCmd.toLowerCase() : '';

                    // 不需要解析数据的命令
                    if (['cal', 'mv', 'mvsetting', 'stop', 'zero', 'zerosetting'].includes(cmd)) {
                        pendingCmd = null;
                        return;
                    }

                    if (resp.status === 'success' && hexStr) {
                        const val = parseStatusByte(hexStr);
                        if (val !== null) {
                            if (cmd === 'zerostatus') {
                                const desc = zeroStatusMap[val] || ('未知(0x' + val.toString(16) + ')');
                                $('zeroStatusResult').textContent = desc;
                                $('zeroStatusResult').style.color = '#0066cc';
                            } else if (cmd === 'estatus') {
                                const desc = eStatusMap[val] || ('未知(0x' + val.toString(16) + ')');
                                $('eStatusResult').textContent = desc;
                                $('eStatusResult').style.color = '#0066cc';
                            }
                        }
                        pendingCmd = null;
                    }
                } catch (e) {
                    // 忽略解析错误
                }
            };
        };

        $('disconnectBtn').onclick = () => {
            if (ws) { ws.close(); }
        };

        // ---- 1. Cal ----
        $('calBtn').onclick = () => sendCmd('Cal', []);

        // ---- 2. Mv ----
        $('mvBtn').onclick = () => {
            const pulse = parseInt($('mvPulse').value);
            if (isNaN(pulse)) { log('请输入有效脉冲数'); return; }
            sendCmd('Mv', [pulse]);
        };

        // ---- 3. MvSetting ----
        $('mvSettingBtn').onclick = () => {
            const accel = parseInt($('mvAccel').value);
            const speed = parseInt($('mvSpeed').value);
            if (isNaN(accel) || isNaN(speed)) { log('请输入有效参数'); return; }
            sendCmd('MvSetting', [accel, speed]);
        };

        // ---- 4. Stop ----
        $('stopBtn').onclick = () => sendCmd('Stop', []);

        // ---- 5. Zero ----
        $('zeroBtn').onclick = () => sendCmd('Zero', []);

        // ---- 6. ZeroSetting ----
        $('zeroSettingBtn').onclick = () => {
            const params = [
                parseInt($('zsSpeed').value),
                parseInt($('zsTimeout').value),
                parseInt($('zsCollSpeed').value),
                parseInt($('zsCollCurrent').value),
                parseInt($('zsCollTime').value)
            ];
            if (params.some(isNaN)) { log('请输入有效参数'); return; }
            sendCmd('ZeroSetting', params);
        };

        // ---- 7. ZeroStatus ----
        $('zeroStatusBtn').onclick = () => {
            $('zeroStatusResult').textContent = '查询中...';
            $('zeroStatusResult').style.color = '#ff9900';
            sendCmd('ZeroStatus', []);
        };

        // ---- 8. EStatus ----
        $('eStatusBtn').onclick = () => {
            $('eStatusResult').textContent = '查询中...';
            $('eStatusResult').style.color = '#ff9900';
            sendCmd('EStatus', []);
        };
    </script>
</body>
</html>
